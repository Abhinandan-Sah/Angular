<section>
  <h2 class="h4 mb-3">Orders</h2>
  <p class="mb-3">This page shows all orders in a simple table.</p>

  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-light">
        <tr>
          <th>Order Id</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Price</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.id }}</td>
          <td>{{ order.customer }}</td>
          <td>{{ order.product }}</td>
          <td>{{ order.price | currency:'INR' }}</td>
          <td>{{ order.orderedOn | date:'mediumDate' }}</td>
          <td>{{ order.status | orderStatus }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
