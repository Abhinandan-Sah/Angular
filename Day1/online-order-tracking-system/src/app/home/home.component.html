<section>
  <div class="card">
    <div class="card-body">
      <h2 class="h4 mb-3">Welcome</h2>
      <p class="mb-3">This is the home page for the online order tracking system.</p>
      <p class="mb-3">Use the Orders page to view the list of orders with formatted price, date, and delivery status.</p>

      <ul class="mb-4">
        <li *ngFor="let item of highlights">{{ item }}</li>
      </ul>

      <a routerLink="/orders" class="btn btn-primary">Go to Orders</a>
    </div>
  </div>
</section>
