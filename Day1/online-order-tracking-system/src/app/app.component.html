<main class="shell">

      <h1>{{ title }}</h1>
      <p class="subtext">Track order progress, inspect formatted dates and prices, and translate status codes with a custom pipe.</p>
    </div>

    <nav class="nav-pills">

  <section class="content-panel">

  </section>
</main>
