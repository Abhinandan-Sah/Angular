<h6 class="text-center text-success">Product List Display</h6>
<table class="table table-hover table-dark table-bordered">
    <thead>
        <tr>
            <td>Id</td>
            <td>Name</td>
            <td>Price</td>
            <td>Mfg Date</td>
            <td>Exp Date</td>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let p of srv.disploayProducts()">
            <td>{{p.id}}</td>
            <td>{{p.pname | titlecase}}</td>
            <td>{{p.price | currency: 'INR'}}</td>
            <td>{{p.mfgDate | date: 'mediumDate'}}</td>
            <td>{{p.expDate | date: 'fullDate'}}</td>
        </tr>
    </tbody>
</table>
