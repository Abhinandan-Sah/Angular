<h6 class="text-center text-primary">Register Product Form</h6>

<form class="form group m-2 p-2" #regForm="ngForm" (ngSubmit)="regProduct()">
    <label for="id" class="form-label">Product ID</label>
    <input type="text" class="form-control" name="id" [(ngModel)]="product.id" />

    <label for="pname" class="form-label">Product Name</label>
    <input type="text" class="form-control" name="pname" [(ngModel)]="product.pname" />

    <label for="price" class="form-label">Product Price</label>
    <input type="text" class="form-control" name="price" [(ngModel)]="product.price" />

    <label for="mfgDate" class="form-label">Manufacture Date</label>
    <input type="text" class="form-control" name="mfgDate" [(ngModel)]="product.mfgDate" />

    <label for="expDate" class="form-label">Expire Date</label>
    <input type="text" class="form-control" name="expDate" [(ngModel)]="product.expDate" />

    <button type="submit" class="btn bg-success text-white mt-4" [disable]="!regForm.form.valid">Register Product</button>
    
</form>
